{
  "locations": {
    "core_buoys": ["fedjeosen", "fauskane"],
    "external_validation_buoys": ["vestfjorden"],
    "study_areas": ["kristiansund", "stavanger", "bergen"]
  },

  "methods": [
    "linear",
    "pqm",
    "dagqm",
    "gpr",
    "xgboost",
    "transformer"
  ],

  "columns": {
    "time": "time",
    "hs_model": "hs",
    "hs_obs": "Significant_Wave_Height_Hm0",
    "per_model": "tm2",
    "per_obs": "Wave_Mean_Period_Tm02",
    "dir_model": "Pdir"
  },

  "validation": {
    "local_cv_folds": 4,
    "local_cv_min_train_samples": 100,
    "local_cv_min_test_samples": 20,
    "cv_time_group": "month"
  },

  "dagqm": {
    "n_direction_sectors": 8,
    "min_samples_per_sector": 80,
    "blend_global_weight": 0.35
  },

  "ml": {

    "default_features": [
      "hs",
      "tp",
      "tm2",
      "hs_sea",
      "hs_swell",
      "wind_speed_10m",
      "wind_speed_100m",
      "month_sin",
      "month_cos",
      "dir_sin",
      "dir_cos",
      "wind_dir_sin",
      "wind_dir_cos"
    ],

    "xgboost": {
      "features": [],
      "min_train_samples": 50,
      "n_estimators": 213,
      "max_depth": 8,
      "learning_rate": 0.06005781482871712,
      "subsample": 0.8419493729793056,
      "colsample_bytree": 0.6066764717364604,
      "gamma": 4.949030989668321,
      "min_child_weight": 8.994740827785131,
      "reg_alpha": 8.179219788797322,
      "reg_lambda": 0.0012047099957342748,

      "random_state": 1
    },

    "transformer": {
      "features": [],
      "sequence_length": 88,
      "validation_fraction": 0.20,
      "min_train_samples": 80,
      "min_val_samples": 20,
      "batch_size": 32,
      "max_epochs": 200,
      "patience": 20,
      "d_model": 128,
      "nhead": 8,
      "num_layers": 3,
      "dropout": 0.1587960347907726,
      "dim_feedforward": 384,
      "learning_rate": 0.0013557325296974098,
      "weight_decay": 3.188693678213564e-05,
      "random_state": 1
    },

    "ensemble_xgboost": {
      "n_estimators": 386,
      "max_depth": 9,
      "learning_rate": 0.19021874637498384,
      "subsample": 0.9583319234848616,
      "colsample_bytree": 0.94588656966263,
      "gamma": 0.01718981466152432,
      "reg_alpha": 0.4017946792150369,
      "reg_lambda": 0.11118190830416234,
      "random_state": 1
    },

    "gpr": {
      "features": [],
      "max_train_samples": 1500,
      "random_state": 1,
      "n_restarts_optimizer": 2
    }
  },

  "thresholds": {
    "evt_threshold_quantile": 0.95,
    "decluster_hours": 48.0,
    "evt_min_events": 20,
    "evt_return_periods": [10, 20, 50],
    "evt_bootstrap_samples": 1000
  },

  "paths": {
    "pairs": "data/input/nora3_buoy_combined/NORA3_{location}_pairs.csv",
    "hindcast_raw": "data/input/nora3_locations/NORA3_wind_wave_{location}_1969_2025.csv",
    "corrected": "data/output/{location}/hindcast_corrected_{corr_method}.csv",
    "validation": "data/output/{location}/validation_{corr_method}.csv",
    "evt_results_root": "results/extreme_value_modelling"
  }
}